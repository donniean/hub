name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install

      # - name: Quality Check
      #   run: pnpm run quality:check
      # Checks

      - name: format:package-json:check
        run: pnpm run format:package-json:check

      - name: format:prettier:check
        run: pnpm run format:prettier:check

      # - name: lint:types:check
      #   run: pnpm run lint:types:check

      # - name: lint:js:check
      #   run: pnpm run lint:js:check

      - name: lint:styles:check
        run: pnpm run lint:styles:check

      - name: lint:html:check
        run: pnpm run lint:html:check

      - name: lint:markdown:check
        run: pnpm run lint:markdown:check

      - name: lint:text:check
        run: pnpm run lint:text:check

      - name: lint:spelling:check
        run: pnpm run lint:spelling:check
