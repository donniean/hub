name: Dependencies Bump

on:
  workflow_call:
    inputs:
      app-client-id:
        description: GitHub App client ID for reusable workflow callers. Direct runs use vars.APP_CLIENT_ID.
        required: true
        type: string
      is-auto-merge:
        required: false
        type: boolean
        default: true
    secrets:
      APP_PRIVATE_KEY:
        required: true
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install

      - name: Bump Dependencies
        run: pnpm run ncu:upgrade

      - name: Remove Dependencies
        run: pnpm dlx rimraf@latest --glob "**/node_modules/" "**/pnpm-lock.yaml"

      - name: Install Updated Dependencies
        run: pnpm install --no-frozen-lockfile

      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          # Reusable callers pass this input; direct runs use this repository variable.
          client-id: ${{ inputs.app-client-id || vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: 'Create Pull Request'
        id: create-pull-request
        env:
          COMMIT_MESSAGE: 'chore(bot): bump dependencies'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: ${{ env.COMMIT_MESSAGE }}
          signoff: true
          delete-branch: true
          branch-suffix: timestamp
          sign-commits: true
          title: ${{ env.COMMIT_MESSAGE }}

      - name: Auto-Merge Pull Request
        if: >
          steps.create-pull-request.outputs.pull-request-number &&
          toJSON(inputs.is-auto-merge) != 'false'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_URL: ${{ steps.create-pull-request.outputs.pull-request-url }}
        run: |
          gh pr merge --auto --squash "$PR_URL"
